apiVersion: apps/v1
kind: Deployment
metadata:
  name: zakatflow
  namespace: zakat-system
  labels:
    app.kubernetes.io/name: zakatflow
    app.kubernetes.io/component: app
    app.kubernetes.io/version: '1.1.0'
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: zakatflow
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zakatflow
        app.kubernetes.io/component: app
        app.kubernetes.io/version: '1.1.0'
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: zakatflow
          image: zakatflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: zakatflow-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: zakatflow-config
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: zakatflow-config
                  key: HOST
            - name: SPREADSHEET_ID
              valueFrom:
                secretKeyRef:
                  name: zakatflow-secret
                  key: SPREADSHEET_ID
            - name: GOOGLE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: zakatflow-secret
                  key: GOOGLE_CLIENT_EMAIL
            - name: GOOGLE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: zakatflow-secret
                  key: GOOGLE_PRIVATE_KEY
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '250m'
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
