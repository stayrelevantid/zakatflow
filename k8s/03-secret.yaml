apiVersion: v1
kind: Secret
metadata:
  name: zakatflow-secret
  namespace: zakat-system
  labels:
    app.kubernetes.io/name: zakatflow
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # IMPORTANT: Replace these values with actual secrets
  # Use: kubectl create secret generic zakatflow-secret \
  #   --from-literal=SPREADSHEET_ID=your-spreadsheet-id \
  #   --from-literal=GOOGLE_CLIENT_EMAIL=your-service-account-email \
  #   --from-literal=GOOGLE_PRIVATE_KEY='your-private-key' \
  #   -n zakat-system

  SPREADSHEET_ID: 'REPLACE_WITH_SPREADSHEET_ID'
  GOOGLE_CLIENT_EMAIL: 'REPLACE_WITH_SERVICE_ACCOUNT_EMAIL'
  GOOGLE_PRIVATE_KEY: 'REPLACE_WITH_PRIVATE_KEY'
